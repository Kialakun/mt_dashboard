version: '3.9'

volumes:
  mongodata:

services:
  # NOTE: Mongodb uses anonymous volumes. Thus when rebuilding any DB settings plaese run the following:
  # "docker-compose up --build --force-recreate --renew-anon-volumes"
  # This will ensure DB volumes are destroyed and new ones are created.
  mongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: mtdashboard_app
    ports:
      - 27017
    volumes: 
      - mongodata:/data/db

  mongo-express:
    image: mongo-express
    restart: always
    depends_on: 
      - mongo
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      
  backend:
    build: ./backend
    restart: always
    depends_on: 
      - mongo
    volumes:
      - ./backend:/app
    ports:
      - 5600

  frontend:
    build: ./frontend
    ports:
      - 8080
    depends_on:
      - backend
    volumes:
      - ./frontend:/frontend
    environment: 
      - CHOKIDAR_USEPOLLING=true

  nginx:
    image: nginx:alpine
    ports:
      - 8001:8000
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  
    