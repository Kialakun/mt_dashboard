version: '3.9'

services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - 5600

  frontend:
    build: ./frontend
    ports:
      - 8080
    depends_on:
      - backend
    volumes:
      - ./frontend:/frontend
    environment: 
      - CHOKIDAR_USEPOLLING=true

  nginx:
    image: nginx:alpine
    ports:
      - 8001:8000
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    